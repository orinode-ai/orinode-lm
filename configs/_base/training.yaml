# configs/_base/training.yaml
# Default training hyperparameters inherited by all stage configs.

optimizer:
  type: adamw
  lr: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.999]
  eps: 1.0e-8
  fused: true                     # torch fused AdamW (requires CUDA)

scheduler:
  type: cosine_with_warmup
  warmup_steps: 2000
  min_lr_ratio: 0.1               # final LR = lr * min_lr_ratio

training:
  max_steps: 100000
  eval_interval: 1000
  checkpoint_interval: 1000
  grad_clip: 1.0
  gradient_accumulation_steps: 16 # effective batch = batch_size * grad_accum * world_size
  batch_size_per_gpu: 4
  seed: 42
  bf16: true
  gradient_checkpointing: true

fsdp:
  enabled: true
  sharding_strategy: FULL_SHARD
  cpu_offload: false
  activation_checkpointing: true

checkpointing:
  save_dir: ${oc.env:ORINODE_WORKSPACE,workspace}/models/checkpoints
  keep_best_n: 3
  metric: eval_loss               # primary metric for keep-best logic
  mode: min                       # lower is better

logging:
  wandb_project: orinode-lm
  log_interval: 10
  profile_steps: 0                # 0 = no torch.profiler
