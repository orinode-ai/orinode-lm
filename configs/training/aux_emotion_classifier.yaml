defaults:
  - _self_

run_id: aux_emotion_v1

model:
  model_id: facebook/wav2vec2-large-xlsr-53
  freeze_encoder: true
  dropout: 0.1

training:
  lr: 5e-4
  weight_decay: 0.01
  beta1: 0.9
  beta2: 0.999
  num_epochs: 30
  grad_accum_steps: 8
  max_grad_norm: 1.0
  warmup_steps: 1000
  checkpoint_every_steps: 2000

data:
  # Strategy 1: IEMOCAP + RAVDESS (English transfer)
  # Replace with Nigerian data when available (see docs/AUX_MODELS.md)
  manifest: workspace/data/manifests/emotion_train.jsonl
  val_manifest: workspace/data/manifests/emotion_val.jsonl
  sample_rate: 16000
  max_duration_sec: 10.0
  batch_size: 16
  labels: [happy, angry, sad, neutral]

# Disclaimer: model is trained on English transfer data.
# UI always shows Preview badge until Nigerian emotional speech is added.
preview: true
